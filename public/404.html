<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Tickle My Pickle</title>
    <!--
      GitHub Pages has no SPA fallback, so it serves this 404.html for any
      unknown path. This redirects to index.html with the original path encoded
      in the query string; a script in index.html restores it for the router.
      pathSegmentsToKeep = 1 keeps the project base segment (/tickle-my-pickle/).
      See https://github.com/rafgraph/spa-github-pages
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      )
    </script>
  </head>
  <body></body>
</html>
